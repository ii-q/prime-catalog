<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>PRIME | Power Transmission</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Manrope', 'sans-serif'],
            },
            colors: {
              prime: {
                bg: '#FDFBF7',         // Light Warm Beige (Sand)
                card: '#FFFFFF',       // White
                cardHover: '#F5F5DC',  // Beige
                text: '#1C1917',       // Dark Stone/Black
                muted: '#57534E',      // Stone 600
                border: '#E7E5E4',     // Stone 200
                blue: '#00B8FC',       // Logitech Blue
                blueHover: '#0095CC',  // Darker Blue for hover
                orange: '#FF6B00',     // Premium Automotive Safety Orange
                orangeHover: '#E05E00' // Darker orange for hover/active
              }
            },
            animation: {
              'float': 'float 8s ease-in-out infinite',
              'spin-slow': 'spin 20s linear infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              }
            }
          }
        }
      }
    </script>
  <script type="importmap">
